name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

# Despliegue a Dokploy (VPS, Docker Compose, subdominios dinámicos por prototipo)
# está diferido hasta que el proyecto esté más avanzado. Este workflow solo corta
# un release/tag en cada merge a main. Cuando se active Dokploy, añadir aquí un job
# `deploy` que invoque el webhook de Dokploy o despliegue el compose stack por SSH.

jobs:
  release:
    name: Create release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute tag
        id: tag
        run: echo "tag=v$(date +%Y%m%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
