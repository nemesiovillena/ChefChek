name: Frontend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

defaults:
  run:
    working-directory: frontend

jobs:
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: '0'

      - name: Lint
        run: bun run lint
        # Frontend has pre-existing lint debt (~200 errors). Non-blocking until
        # cleared; output is still visible in the run logs. Remove
        # continue-on-error to make lint enforce the gate.
        continue-on-error: true

      - name: Build
        run: bun run build
