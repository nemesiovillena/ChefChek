name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

defaults:
  run:
    working-directory: backend

jobs:
  quality:
    name: Lint, Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          # Skip husky prepare hook in CI (no .git at subdir in monorepo)
          HUSKY: '0'

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Lint
        # Run eslint without --fix so CI reports issues without mutating files
        # (the project's `lint` script includes --fix for local dev convenience).
        run: bunx eslint "{src,apps,libs,test}/**/*.ts"

      - name: Build
        run: bun run build

      - name: Unit tests
        run: bun run test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: chefchek
          POSTGRES_PASSWORD: chefchek_password
          POSTGRES_DB: chefchek_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chefchek"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://chefchek:chefchek_password@localhost:5432/chefchek_test?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: '0'

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Apply migrations
        run: bunx prisma migrate deploy

      - name: E2E tests
        run: bun run test:e2e
