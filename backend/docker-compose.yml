version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:14-alpine
    container_name: chefchek-postgres
    environment:
      POSTGRES_USER: chefchek
      POSTGRES_PASSWORD: chefchek_password_change_in_production
      POSTGRES_DB: chefchek
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - chefchek-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chefchek"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: chefchek-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chefchek-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chefchek-backend
    environment:
      DATABASE_URL: "postgresql://chefchek:chefchek_password_change_in_production@postgres:5432/chefchek?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_SECRET: "CHANGE_THIS_TO_SECURE_32_CHAR_SECRET_IN_PRODUCTION"
      JWT_EXPIRES_IN: "24h"
      NODE_ENV: production
      PORT: 3001
      API_PREFIX: "/api"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chefchek-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend (Next.js)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: chefchek-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: "http://backend:3001"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - chefchek-network
    restart: unless-stopped

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: chefchek-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - chefchek-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  chefchek-network:
    driver: bridge