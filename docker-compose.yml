version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: chefchek-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chefchek
      POSTGRES_PASSWORD: chefchek_password_change_in_prod
      POSTGRES_DB: chefchek
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chefchek"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chefchek-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chefchek-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://chefchek:chefchek_password_change_in_prod@postgres:5432/chefchek?schema=public
      PORT: 3001
      JWT_SECRET: your-jwt-secret-change-in-production
      JWT_EXPIRES_IN: 1d
      FRONTEND_URL: http://localhost:3000
      APP_NAME: ChefChek
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
      - /app/dist
    networks:
      - chefchek-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Backend hostname inside the docker network (baked into next rewrites at build time)
        BACKEND_URL: http://backend:3001
    container_name: chefchek-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - chefchek-network

volumes:
  postgres_data:

networks:
  chefchek-network:
    driver: bridge